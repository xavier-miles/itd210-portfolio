<main>
	<form class="contact-form" action="https://formspree.io/f/maqajyln" method="POST">
		<label for="contactName">Your name</label>
		<input type="text" id="contactName" name="name" required>

		<label for="emailPhone">Email/Phone</label>
		<input id="emailPhone" name="emailPhone" required>

		<label for="contactMessage">Message</label>
		<textarea id="contactMessage" name="message" placeholder="Describe the services you're looking for" required></textarea>

		<div class="contact-buttons">
			<button type="submit" id="contactSubmit">Send your message</button>
		</div>
	</form>
</main>
